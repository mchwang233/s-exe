# =============================================================================
# top.cfg - top-level ssv_root_cfg definition
# =============================================================================

ssv_root_cfg {
  int unsigned       :: NUM_AGENTS       = 2;
  bit                :: ENABLE_LOG        = 1'b1;
  bit                :: ENABLE_CHECKER    = 1'b0;
  string             :: ENV_NAME          = "ssv_default";
  string             :: DEFAULT_SEED      = "no_seed";
  real               :: CLK_PERIOD_NS     = 10.0;

  // ---- dynamic array & queue demo ----
  // Dynamic array: in .cmd use FIELD.size to change length, FIELD[N] to write the Nth element
  int[]   :: MY_DYN_ARR;
  // Queue: each line of `QUEUE = val` in .cmd does one push_back
  int[$]  :: MY_QUEUE;
  // string dynamic arrays / queues are supported the same way
  string[] :: NAMES;
  string[] :: NAMES_Q;
  // Dynamic array with default values
  int[]   :: COUNTERS = '{1, 2, 3};

  sub_agent_cfg agent_a {
    int  :: AGENT_ID   = 0;
    bit  :: IS_ACTIVE  = 1'b1;
    int  :: ADDR_WIDTH = 32;
    int  :: DATA_WIDTH = 64;
  }

  sub_agent_cfg agent_b {
    int  :: AGENT_ID   = 1;
    bit  :: IS_ACTIVE  = 1'b0;
    int  :: ADDR_WIDTH = 16;
    int  :: DATA_WIDTH = 32;
  }
}