# =============================================================================
# sub_agent.cfg - sub-agent configuration class definition
#
# This cfg is referenced and instantiated by top.cfg via "sub_agent_cfg <inst_name> { ... }".
# The same class can be instantiated multiple times (agent_a / agent_b ...), and each instance can override fields.
# =============================================================================

sub_agent_cfg {
  int    :: AGENT_ID    = 0;
  bit    :: IS_ACTIVE   = 1'b1;
  int    :: ADDR_WIDTH  = 32;
  int    :: DATA_WIDTH  = 64;
  string :: NAME        = "sub_agent_default";
  real   :: TURN_AROUND = 0.0;
}